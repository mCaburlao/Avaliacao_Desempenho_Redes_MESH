---
experiment:
  name: "Pilot 100 Nodes - AODV vs OLSR Comparison"
  date: "2026-04-04"
  phase: "Phase 1: Initial Validation"
  goal: "Validate MeshSim functionality, data collection, metric sanity"

reproducibility:
  environment:
    ns3_dir: $NS3_DIR
    meshsim_binary: ./MeshSim-master/build/sim/mesh_sim
    os: "Ubuntu 20.04 LTS (WSL2)"
    cmake_version: "3.16+"
    make_version: "4.3+"
    gcc_version: "9.4+"
  
  random_seeds:
    aodv_mobility_seed: 42
    olsr_mobility_seed: 43
    note: "Fixed seeds for reproducibility. Increase for statistical replicas"
  
  simulation_parameters:
    num_nodes: 100
    area_x: 1000.0  # meters
    area_y: 1000.0  # meters
    duration: 600   # seconds
    traffic_start: 10.0
    traffic_duration: 590.0
    traffic_rate: 1000  # packets/sec (UDP)
    traffic_sink: "node 99"
    traffic_source: "node 0"
    protocol_aodv: "AODV"
    protocol_olsr: "OLSR"
    wifi_standard: "802.11g"
    tx_power: "20 dBm"
    rx_gain: "0 dBm"

metrics_collected:
  - PDR: "Packet Delivery Ratio (%)"
  - latency: "End-to-end latency (ms)"
  - overhead: "Control packet overhead (%)"
  - throughput: "Data throughput (pps)"

output:
  pcap_files:
    - mesh.pcap
    - sta-wifi.pcap
  trace_files:
    - trace.txt
    - results.csv
  analysis_output:
    - packet_distribution.png
    - metrics_summary.json

notes: |
  Target: Baseline for AODV and OLSR at 100 nodes
  Next: Scale to 300, 500 nodes with same configuration
  Publication: Supplementary Materials will reference this METADATA file
